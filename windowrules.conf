windowrule = match:class ^(scrcpy)$, size 320 725
windowrule = match:class ^(scrcpy)$, move 100%-330 36
windowrule = match:class ^(scrcpy)$, no_anim on
windowrule = match:class ^(scrcpy)$, border_size 0

